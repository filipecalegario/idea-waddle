name: Build living site

# Gera a caixa morfológica viva a cada PR (preview no log) e publica no
# GitHub Pages a cada push na main. Ver engine/cca.py.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    # "Agente propõe, humano dispõe": todo PR é validado contra o padrão de
    # escrita (AGENTS.md). PR inválido falha aqui e não é construído/publicado.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install -r engine/requirements.txt
      - name: Validar padrão de contribuição (lint)
        run: python engine/lint.py

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install -r engine/requirements.txt
      - name: Rodar motor (CCA) e gerar site
        run: python engine/cca.py
      - name: Upload artefato do Pages
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Só publica em push na main (não em PRs).
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
