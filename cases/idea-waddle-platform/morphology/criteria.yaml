# Critérios de avaliação (QOC) do design da própria plataforma.
# 'weight' (opcional, default 1) pondera o critério no Índice QOC composto.
criteria:
  - id: alcance
    label: "Alcance (quantos participam)"
    kind: qualitative
    scale: "1-5 (maior = mais alcance)"
    direction: maximize
    aggregation: min
    weight: 2
  - id: soberania
    label: "Soberania de dados"
    kind: qualitative
    scale: "1-5 (maior = mais soberano)"
    direction: maximize
    aggregation: min
    weight: 1
  - id: simplicidade
    label: "Simplicidade operacional"
    kind: qualitative
    scale: "1-5 (maior = mais simples)"
    direction: maximize
    aggregation: min
    weight: 1
