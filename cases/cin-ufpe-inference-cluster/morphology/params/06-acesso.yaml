      rationale: "Acesso fácil p/ usuários não-técnicos da comunidade."
    - id: opt.acesso.ambos
      label: "API + chat (ambos)"
      proposed_by: "agent:discovery"
      model: "claude-opus-4-8"
      status: proposed
      rationale: "Cobre pesquisadores e usuários finais; mais superfície a manter."
