parameter:
  id: aceleracao
  label: "Hardware de aceleração"
  description: "Que acelerador(es) formam a base do cluster de inferência."
  # Gancho p/ camadas futuras (IBIS/QOC): id da Issue/Questão associada.
  ibis_issue: null
  options:
    - id: opt.aceleracao.h100
      label: "NVIDIA H100 / H200 (data center, topo)"
      proposed_by: "agent:discovery"
      model: "claude-opus-4-8"
      status: proposed
      rationale: "Ecossistema CUDA maduro; melhor suporte de software de serving."
    - id: opt.aceleracao.l40s
      label: "NVIDIA L40S / RTX 6000 Ada (custo-benefício)"
      proposed_by: "agent:discovery"
      model: "claude-opus-4-8"
      status: proposed
      rationale: "Menor custo por placa; boa p/ inferência de modelos médios."
    - id: opt.aceleracao.mi300
      label: "AMD Instinct MI300X"
      proposed_by: "agent:discovery"
      model: "claude-opus-4-8"
      status: proposed
      rationale: "Alta VRAM (192GB); alternativa ao monopólio NVIDIA; ROCm amadurecendo."
    - id: opt.aceleracao.ascend
      label: "Huawei Ascend 910B"
      proposed_by: "agent:discovery"
      model: "claude-opus-4-8"
      status: proposed
      rationale: "Opção do mercado chinês; relevante diante de restrições de exportação."
